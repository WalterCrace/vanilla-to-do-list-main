<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>to-do-list-vanilla</title>
  </head>
  <body>
    <div id="todo-container">
        <h1>📝 Mi Lista de Tareas</h1>
        
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Escribe una nueva tarea...">
            <button id="addBtn">Agregar</button>
        </div>
        
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">Todas</button>
            <button class="filter-btn" data-filter="active">Activas</button>
            <button class="filter-btn" data-filter="completed">Completadas</button>
        </div>
        
        <div id="taskList"></div>
        
        <div class="stats" id="stats"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
